<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Connection Test - BamLead</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            margin-bottom: 25px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #cbd5e0;
        }
        .test-section.loading { border-left-color: #4299e1; }
        .test-section.success { border-left-color: #48bb78; background: #f0fff4; }
        .test-section.error { border-left-color: #f56565; background: #fff5f5; }
        .test-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }
        .spinner {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #4299e1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .test-details {
            font-size: 13px;
            color: #4a5568;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
        }
        .detail-row {
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .detail-label {
            font-weight: 500;
        }
        .detail-value {
            color: #2d3748;
        }
        .error-msg {
            color: #c53030;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            font-size: 12px;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        .refresh-btn:hover {
            background: #5568d3;
        }
        .refresh-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        .summary {
            margin-top: 30px;
            padding: 20px;
            background: #edf2f7;
            border-radius: 8px;
            text-align: center;
        }
        .summary.success { background: #c6f6d5; color: #22543d; }
        .summary.error { background: #fed7d7; color: #742a2a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Backend Connection Test</h1>
        <p class="subtitle">Testing frontend and backend connectivity...</p>

        <div id="frontend-test" class="test-section loading">
            <div class="test-title">
                <span class="spinner status-icon"></span>
                Frontend Build
            </div>
            <div class="test-details" id="frontend-details">Testing...</div>
        </div>

        <div id="api-test" class="test-section loading">
            <div class="test-title">
                <span class="spinner status-icon"></span>
                Backend API Health
            </div>
            <div class="test-details" id="api-details">Testing...</div>
        </div>

        <div id="config-test" class="test-section loading">
            <div class="test-title">
                <span class="spinner status-icon"></span>
                Configuration Check
            </div>
            <div class="test-details" id="config-details">Testing...</div>
        </div>

        <div id="database-test" class="test-section loading">
            <div class="test-title">
                <span class="spinner status-icon"></span>
                Database Connection
            </div>
            <div class="test-details" id="database-details">Testing...</div>
        </div>

        <div id="summary" class="summary" style="display: none;">
            <h3 id="summary-text">Running tests...</h3>
        </div>

        <button class="refresh-btn" onclick="runTests()">🔄 Run Tests Again</button>
    </div>

    <script>
        const API_BASE = 'https://bamlead.com/api';
        let testResults = {};

        async function runTests() {
            testResults = {};
            document.getElementById('summary').style.display = 'none';

            resetTest('frontend-test');
            resetTest('api-test');
            resetTest('config-test');
            resetTest('database-test');

            await testFrontend();
            await testAPIHealth();
            await testConfig();
            await testDatabase();

            showSummary();
        }

        function resetTest(id) {
            const el = document.getElementById(id);
            el.className = 'test-section loading';
            const icon = el.querySelector('.status-icon');
            icon.className = 'spinner status-icon';
        }

        function setTestStatus(id, status, title, details) {
            const el = document.getElementById(id);
            el.className = `test-section ${status}`;

            const icon = el.querySelector('.status-icon');
            if (status === 'success') {
                icon.innerHTML = '✅';
                icon.className = 'status-icon';
            } else if (status === 'error') {
                icon.innerHTML = '❌';
                icon.className = 'status-icon';
            }

            el.querySelector('.test-title').innerHTML = icon.outerHTML + title;
            el.querySelector('.test-details').innerHTML = details;
            testResults[id] = status === 'success';
        }

        async function testFrontend() {
            try {
                const details = `
                    <div class="detail-row">
                        <span class="detail-label">React App:</span>
                        <span class="detail-value">✓ Running</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Build Tool:</span>
                        <span class="detail-value">Vite</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Language:</span>
                        <span class="detail-value">TypeScript</span>
                    </div>
                `;
                setTestStatus('frontend-test', 'success', 'Frontend Build', details);
            } catch (err) {
                setTestStatus('frontend-test', 'error', 'Frontend Build',
                    `<div class="error-msg">Error: ${err.message}</div>`);
            }
        }

        async function testAPIHealth() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(`${API_BASE}/health.php`, {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                const details = `
                    <div class="detail-row">
                        <span class="detail-label">Status:</span>
                        <span class="detail-value">${data.status || 'unknown'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Version:</span>
                        <span class="detail-value">${data.version || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">PHP Version:</span>
                        <span class="detail-value">${data.checks?.php_version || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Endpoint:</span>
                        <span class="detail-value">${API_BASE}/health.php</span>
                    </div>
                `;

                setTestStatus('api-test', 'success', 'Backend API Health', details);
            } catch (err) {
                setTestStatus('api-test', 'error', 'Backend API Health',
                    `<div class="error-msg">❌ Cannot reach backend API<br><br>Error: ${err.message}<br><br>Check that:<br>• API files are deployed to ${API_BASE}/<br>• PHP is running<br>• CORS is enabled</div>`);
            }
        }

        async function testConfig() {
            try {
                const response = await fetch(`${API_BASE}/health.php`);
                const data = await response.json();

                if (!data.checks) {
                    throw new Error('No health check data');
                }

                const checks = data.checks;
                const allGood = checks.config_exists && checks.includes_exists && checks.auth_exists;

                const details = `
                    <div class="detail-row">
                        <span class="detail-label">config.php:</span>
                        <span class="detail-value">${checks.config_exists ? '✓' : '✗'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">includes/:</span>
                        <span class="detail-value">${checks.includes_exists ? '✓' : '✗'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">auth.php:</span>
                        <span class="detail-value">${checks.auth_exists ? '✓' : '✗'}</span>
                    </div>
                `;

                setTestStatus('config-test', allGood ? 'success' : 'error',
                    'Configuration Check', details);
            } catch (err) {
                setTestStatus('config-test', 'error', 'Configuration Check',
                    `<div class="error-msg">Cannot check config: ${err.message}</div>`);
            }
        }

        async function testDatabase() {
            try {
                const response = await fetch(`${API_BASE}/health.php`);
                const data = await response.json();

                if (!data.checks) {
                    throw new Error('No health check data');
                }

                const connected = data.checks.database_connected;

                const details = connected ? `
                    <div class="detail-row">
                        <span class="detail-label">Connection:</span>
                        <span class="detail-value">✓ Connected</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Type:</span>
                        <span class="detail-value">PostgreSQL/Supabase</span>
                    </div>
                ` : `
                    <div class="error-msg">
                        ❌ Database not connected<br><br>
                        ${data.checks.database_error || 'Unknown error'}<br><br>
                        Check your config.php database credentials
                    </div>
                `;

                setTestStatus('database-test', connected ? 'success' : 'error',
                    'Database Connection', details);
            } catch (err) {
                setTestStatus('database-test', 'error', 'Database Connection',
                    `<div class="error-msg">Cannot check database: ${err.message}</div>`);
            }
        }

        function showSummary() {
            const summary = document.getElementById('summary');
            const summaryText = document.getElementById('summary-text');

            const allPassed = Object.values(testResults).every(r => r);
            const passedCount = Object.values(testResults).filter(r => r).length;
            const totalCount = Object.keys(testResults).length;

            if (allPassed) {
                summary.className = 'summary success';
                summaryText.innerHTML = '✅ All Tests Passed!<br><br>Frontend and backend are connected and working correctly.';
            } else {
                summary.className = 'summary error';
                summaryText.innerHTML = `⚠️ ${passedCount}/${totalCount} Tests Passed<br><br>Some issues need attention. Check the details above.`;
            }

            summary.style.display = 'block';
        }

        runTests();
    </script>
</body>
</html>
